<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Cercle or extérieur -->
  <circle cx="100" cy="100" r="98" fill="#f5c518"/>
  <!-- Anneau bleu -->
  <circle cx="100" cy="100" r="65" fill="#1a5abf"/>
  <!-- Centre noir -->
  <circle cx="100" cy="100" r="45" fill="#000000"/>

  <defs>
    <path id="arcHaut" d="M 45,100 A 55,55 0 0 1 155,100" fill="none"/>
    <path id="arcBas" d="M 45,100 A 55,55 0 0 0 155,100" fill="none"/>
  </defs>

  <!-- Texte courbe supérieur -->
  <text fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2">
    <textPath href="#arcHaut" startOffset="50%" text-anchor="middle">SECRETS DIVINS</textPath>
  </text>

  <!-- Texte courbe inférieur -->
  <text fill="#ffffff" font-family="Arial, sans-serif" font-size="6" font-weight="700" letter-spacing="0.3">
    <textPath href="#arcBas" startOffset="50%" text-anchor="middle">TOUS TYPES DES SECRETS MYSTIQUES</textPath>
  </text>

  <!-- Flèches séparatrices -->
  <text x="45" y="100" fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle" dominant-baseline="middle" transform="rotate(180 45 100)">►</text>
  <text x="155" y="100" fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle" dominant-baseline="middle">►</text>

  <!-- Carré magique 3x3 en lignes fines dorées -->
  <g stroke="#f5c518" stroke-width="0.75" fill="none">
    <rect x="76" y="76" width="48" height="48"/>
    <line x1="92" y1="76" x2="92" y2="124"/>
    <line x1="108" y1="76" x2="108" y2="124"/>
    <line x1="76" y1="92" x2="124" y2="92"/>
    <line x1="76" y1="108" x2="124" y2="108"/>
  </g>
</svg>
